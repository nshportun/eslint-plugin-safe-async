name: Feature Request
description: Suggest an improvement to the plugin
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Suggest a feature or improvement (not a new rule — use Rule Proposal for that).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this important?

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Show how this would work
